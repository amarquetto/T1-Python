{% extends 'base.html' %}
{% block titulo %}Editar usuário — PataFeliz{% endblock %}

{% block conteudo %}

<div class="mb-4">
  <h1 class="pagina-titulo mb-1">
    <i class="bi bi-pencil-square me-2 text-laranja"></i>Editar usuário
  </h1>
  <p class="text-muted small mb-0">Altere dados, função (permissões) ou status. Deixe a senha em branco para manter a atual.</p>
</div>

<div class="row">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0 card-faixa-laranja">
      <div class="card-body p-4">

        <form method="POST" action="{{ url_for('editar_usuario', id=usuario_edit.id) }}" novalidate>

          <div class="mb-3">
            <label for="nome" class="form-label">Nome completo <span class="texto-obrigatorio">*</span></label>
            <input type="text" class="form-control" id="nome" name="nome" value="{{ usuario_edit.nome }}" required maxlength="120" />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">E-mail <span class="texto-obrigatorio">*</span></label>
            <input type="email" class="form-control" id="email" name="email" value="{{ usuario_edit.email }}" required />
          </div>

          <div class="mb-3">
            <label for="funcao_id" class="form-label">Função (perfil de acesso) <span class="texto-obrigatorio">*</span></label>
            <select class="form-select" id="funcao_id" name="funcao_id" required>
              {% for fn in funcoes %}
              <option value="{{ fn.id }}" {% if usuario_edit.funcao_id == fn.id %}selected{% endif %}>{{ fn.nome }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="ativo" class="form-label">Status do usuário</label>
            <select class="form-select" id="ativo" name="ativo">
              <option value="Sim" {% if usuario_edit.ativo == 'Sim' %}selected{% endif %}>Ativo</option>
              <option value="Não" {% if usuario_edit.ativo == 'Não' %}selected{% endif %}>Inativo</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="senha" class="form-label">Nova senha</label>
            <input type="password" class="form-control" id="senha" name="senha" placeholder="Deixe em branco para não alterar" minlength="6" />
          </div>

          <div class="d-flex flex-wrap gap-2">
            <button type="submit" class="btn btn-laranja px-4">
              <i class="bi bi-check-lg me-1"></i>Salvar alterações
            </button>
            <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline-secondary px-4">Cancelar</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
