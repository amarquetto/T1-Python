{% extends 'base.html' %}
{% block titulo %}Novo Pet — PataFeliz{% endblock %}

{% block conteudo %}

<div class="mb-4">
  <h1 class="pagina-titulo mb-1">
    <i class="bi bi-heart-fill me-2 text-laranja"></i>Cadastrar Novo Pet
  </h1>
  <p class="text-muted small mb-0">Adicione um novo pet ao sistema PataFeliz</p>
</div>

<div class="row">
  <div class="col-md-8 col-lg-7">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">

        <!-- Formulário de cadastro de pet -->
        <form method="POST" action="{{ url_for('inserir_pet') }}" novalidate>

          <div class="row g-3">

            <!-- Campo: Nome do pet -->
            <div class="col-md-6">
              <label for="nome" class="form-label">
                Nome do pet <span class="texto-obrigatorio">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="nome"
                name="nome"
                placeholder="Ex.: Thor, Luna, Mel..."
                required
                maxlength="50"
              />
            </div>

            <!-- Campo: Espécie -->
            <div class="col-md-6">
              <label for="especie" class="form-label">
                Espécie <span class="texto-obrigatorio">*</span>
              </label>
              <select class="form-select" id="especie" name="especie" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Cão">🐶 Cão</option>
                <option value="Gato">🐱 Gato</option>
                <option value="Coelho">🐰 Coelho</option>
                <option value="Pássaro">🐦 Pássaro</option>
                <option value="Hamster">🐹 Hamster</option>
                <option value="Outro">Outro</option>
              </select>
            </div>

            <!-- Campo: Raça -->
            <div class="col-md-6">
              <label for="raca" class="form-label">Raça</label>
              <input
                type="text"
                class="form-control"
                id="raca"
                name="raca"
                placeholder="Ex.: Golden Retriever, SRD..."
                maxlength="60"
              />
              <div class="form-text">Informe SRD se não souber a raça.</div>
            </div>

            <!-- Campo: Idade -->
            <div class="col-md-3">
              <label for="idade" class="form-label">
                Idade (anos) <span class="texto-obrigatorio">*</span>
              </label>
              <input
                type="number"
                class="form-control"
                id="idade"
                name="idade"
                placeholder="Ex.: 3"
                required
                min="0"
                max="30"
              />
            </div>

            <!-- Campo: Peso -->
            <div class="col-md-3">
              <label for="peso" class="form-label">Peso (kg)</label>
              <input
                type="number"
                step="0.1"
                class="form-control"
                id="peso"
                name="peso"
                placeholder="Ex.: 12.5"
                min="0"
              />
            </div>

            <!-- Campo: Nome do tutor -->
            <div class="col-md-8">
              <label for="tutor" class="form-label">
                Nome do tutor <span class="texto-obrigatorio">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="tutor"
                name="tutor"
                placeholder="Ex.: João Alves"
                required
                maxlength="100"
              />
            </div>

            <!-- Campo: Telefone do tutor -->
            <div class="col-md-4">
              <label for="telefone_tutor" class="form-label">Telefone do tutor</label>
              <input
                type="tel"
                class="form-control"
                id="telefone_tutor"
                name="telefone_tutor"
                placeholder="(14) 99999-0000"
                maxlength="15"
              />
            </div>

            <!-- Campo: Observações -->
            <div class="col-12">
              <label for="observacoes" class="form-label">Observações</label>
              <textarea
                class="form-control"
                id="observacoes"
                name="observacoes"
                rows="3"
                placeholder="Alergias, comportamento, condições especiais de saúde..."
                maxlength="500"
              ></textarea>
              <div class="form-text">Informações relevantes para o atendimento.</div>
            </div>

          </div><!-- /row -->

          <!-- Botões de ação -->
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-laranja px-4">
              <i class="bi bi-check-lg me-1"></i>Salvar Pet
            </button>
            <a href="{{ url_for('listar_pets') }}" class="btn btn-outline-secondary px-4">
              <i class="bi bi-x-lg me-1"></i>Cancelar
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
