{% extends 'base_publica.html' %}
{% block titulo %}Login — PataFeliz{% endblock %}

{% block conteudo %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="auth-card">
        <!-- Cabeçalho do card -->
        <div class="auth-card-header text-center mb-4">
          <div class="auth-icone">🐾</div>
          <h2 class="auth-titulo">Bem-vindo de volta!</h2>
          <p class="text-muted small">Acesse o sistema PataFeliz</p>
        </div>

        <!-- Formulário de login -->
        <form method="POST" action="{{ url_for('login') }}" novalidate>

          <!-- Campo: E-mail -->
          <div class="mb-3">
            <label for="email" class="form-label">
              <i class="bi bi-envelope me-1"></i>E-mail
            </label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
              autocomplete="email"
            />
            <!-- Dica: use o e-mail cadastrado no sistema -->
          </div>

          <!-- Campo: Senha -->
          <div class="mb-4">
            <label for="senha" class="form-label">
              <i class="bi bi-lock me-1"></i>Senha
            </label>
            <div class="input-group">
              <input
                type="password"
                class="form-control"
                id="senha"
                name="senha"
                placeholder="Sua senha"
                required
                autocomplete="current-password"
              />
              <!-- Botão para exibir/ocultar senha -->
              <button class="btn btn-outline-secondary" type="button" id="toggleSenha" title="Exibir/ocultar senha">
                <i class="bi bi-eye" id="iconeSenha"></i>
              </button>
            </div>
            <!-- Dica de desenvolvimento: a senha de teste é '1234' -->
            <div class="form-text text-muted">
              <i class="bi bi-info-circle me-1"></i>Dica da senha: <code></code>
            </div>
          </div>

          <!-- Botão de submit -->
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-laranja btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
          </div>

          <!-- Link para cadastro -->
          <p class="text-center text-muted small">
            Ainda não tem conta?
            <a href="{{ url_for('cadastro') }}" class="link-laranja">Cadastre-se grátis</a>
          </p>

        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}
