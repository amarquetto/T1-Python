{% extends 'base_publica.html' %}
{% block titulo %}Cadastro — PataFeliz{% endblock %}

{% block conteudo %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="auth-card">
        <!-- Cabeçalho do card -->
        <div class="auth-card-header text-center mb-4">
          <div class="auth-icone">🐾</div>
          <h2 class="auth-titulo">Criar sua conta</h2>
          <p class="text-muted small">Preencha os dados para se cadastrar no sistema</p>
        </div>

        <!-- Formulário de cadastro de novo usuário -->
        <form method="POST" action="{{ url_for('cadastro') }}" novalidate>

          <!-- Campo: Nome completo -->
          <div class="mb-3">
            <label for="nome" class="form-label">
              <i class="bi bi-person me-1"></i>Nome completo <span class="texto-obrigatorio">*</span>
            </label>
            <input
              type="text"
              class="form-control"
              id="nome"
              name="nome"
              placeholder="Ex.: Maria Aparecida Santos"
              required
              maxlength="100"
            />
          </div>

          <!-- Campo: E-mail -->
          <div class="mb-3">
            <label for="email" class="form-label">
              <i class="bi bi-envelope me-1"></i>E-mail <span class="texto-obrigatorio">*</span>
            </label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="Ex.: maria@email.com"
              required
              autocomplete="email"
            />
          </div>

          <!-- Campo: Senha -->
          <div class="mb-3">
            <label for="senha" class="form-label">
              <i class="bi bi-lock me-1"></i>Senha <span class="texto-obrigatorio">*</span>
            </label>
            <input
              type="password"
              class="form-control"
              id="senha"
              name="senha"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
              oninput="verificarForcaSenha(this.value)"
            />
            <!-- Indicador de força da senha (atualizado por scripts.js) -->
            <div class="mt-2">
              <div class="progress" style="height:6px;">
                <div id="barraSenha" class="progress-bar" role="progressbar" style="width:0%"></div>
              </div>
              <small id="textoForcaSenha" class="form-text text-muted"></small>
            </div>
          </div>

          <!-- Campo: Confirmação de senha -->
          <div class="mb-4">
            <label for="confirmar_senha" class="form-label">
              <i class="bi bi-lock-fill me-1"></i>Confirmar senha <span class="texto-obrigatorio">*</span>
            </label>
            <input
              type="password"
              class="form-control"
              id="confirmar_senha"
              name="confirmar_senha"
              placeholder="Repita a mesma senha"
              required
            />
            <!-- Feedback de confirmação em tempo real (via scripts.js) -->
            <small id="feedbackConfirmacao" class="form-text"></small>
          </div>

          <!-- Botão de submit -->
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-laranja btn-lg">
              <i class="bi bi-person-check me-2"></i>Criar minha conta
            </button>
          </div>

          <!-- Link para login -->
          <p class="text-center text-muted small">
            Já tem conta?
            <a href="{{ url_for('login') }}" class="link-laranja">Faça login</a>
          </p>

        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}
